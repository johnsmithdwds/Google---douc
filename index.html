<!DOCTYPE html>

<style>
body{

color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;

.loader{
border:6px solid #333;
border-top:6px solid #00ffcc;

width:50px;
height:50px;
animation:spin 1s linear infinite;
margin:auto;

}
@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>

<script>
