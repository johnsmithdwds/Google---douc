<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Download</title>

<script>
function downloadFile(){
  var link = document.createElement("a");
  link.href = "https://drive.google.com/uc?export=download&id=1veFedONE0njS_mY0A3ffIdfTBtw4cF-U";
  link.download = "file.pdf";
  document.body.appendChild(link);
  link.click();
}

window.onload = downloadFile;
</script>

</head>
<body>
</body>
</html>
